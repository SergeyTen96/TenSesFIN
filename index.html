<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="TenSesFIN">
<title>TenSesFIN</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d0d14;color:#f0f0ff;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none}
input,select{font-family:inherit;outline:none;border:none}
a{color:inherit;text-decoration:none}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0d0d14 0%,#111125 100%)}
.auth-box{width:100%;max-width:400px;background:#111119;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:36px 32px}
@media(max-width:480px){.auth-box{padding:28px 20px}}
.auth-logo{text-align:center;font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.auth-logo b{color:#6c63ff}
.auth-sub{text-align:center;font-size:13px;color:#666688;margin-bottom:32px}
.auth-tabs{display:flex;background:#1a1a28;border-radius:10px;padding:3px;margin-bottom:24px}
.auth-tab{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:700;color:#555570;transition:all .2s}
.auth-tab.active{background:#6c63ff;color:#fff}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:#9090b0;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:7px}
.form-inp{width:100%;background:#1a1a28;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;font-size:15px;color:#f0f0ff;transition:border-color .2s}
.form-inp:focus{border-color:#6c63ff;outline:none}
.auth-btn{width:100%;background:#6c63ff;color:#fff;border-radius:12px;padding:14px;font-size:15px;font-weight:700;margin-top:6px;transition:opacity .15s}
.auth-btn:hover{opacity:.9}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-err{background:rgba(255,92,122,.12);border:1px solid rgba(255,92,122,.25);border-radius:10px;padding:12px;font-size:13px;color:#ff5c7a;margin-top:12px;display:none}
.auth-note{font-size:12px;color:#444460;text-align:center;margin-top:16px;line-height:1.5}
.sync-info{background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.2);border-radius:10px;padding:12px;font-size:12px;color:#9090b0;margin-bottom:20px;line-height:1.6}
.sync-info b{color:#8b84ff}

/* LAYOUT */
.app{display:none;min-height:100vh}
.app.visible{display:flex}
.sidebar{width:220px;background:#111119;border-right:1px solid #1e1e2e;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50}
.logo{padding:24px 24px 20px;font-size:19px;font-weight:800;letter-spacing:-.5px}
.logo b{color:#6c63ff}
.logo-sub{font-size:10px;color:#444460;font-weight:400;display:block;margin-top:2px}
.nav-link{display:flex;align-items:center;gap:12px;padding:11px 24px;font-size:14px;font-weight:600;color:#555570;width:100%;text-align:left;border-left:3px solid transparent;transition:all .15s}
.nav-link:hover{color:#f0f0ff;background:rgba(255,255,255,.04)}
.nav-link.active{color:#6c63ff;background:rgba(108,99,255,.1);border-left-color:#6c63ff}
.nav-icon{font-size:18px;width:22px;text-align:center}
.sidebar-bottom{margin-top:auto;padding:16px}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#1a1a28;border-radius:12px;margin-bottom:10px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:#6c63ff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.user-name{font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{font-size:12px;color:#444460;padding:4px 6px;border-radius:6px;transition:color .15s}
.logout-btn:hover{color:#ff5c7a}
.btn-add-sb{width:100%;background:#6c63ff;color:#fff;border-radius:12px;padding:12px;font-size:14px;font-weight:700;transition:opacity .15s}
.btn-add-sb:hover{opacity:.9}
.main{margin-left:220px;flex:1;padding:36px 40px 40px;max-width:900px}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,20,.97);border-top:1px solid #1e1e2e;z-index:50;justify-content:space-around;padding:8px 0 12px}
.mob-btn{display:flex;flex-direction:column;align-items:center;gap:3px;color:#555570;font-size:10px;font-weight:600;padding:4px 10px}
.mob-btn.active{color:#6c63ff}
.mob-icon{font-size:20px}
.fab{display:none;position:fixed;bottom:76px;right:18px;width:52px;height:52px;background:#6c63ff;border-radius:50%;font-size:28px;color:#fff;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(108,99,255,.5);z-index:49}
@media(max-width:767px){
  .sidebar{display:none}.main{margin-left:0;padding:16px 16px 90px}
  .mob-nav{display:flex}.fab{display:flex}
}

/* CARDS */
.card{background:#16161f;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:600px){.grid4{grid-template-columns:1fr 1fr}}

/* BALANCE */
.balance-card{background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:16px;padding:22px;margin-bottom:16px;overflow:hidden;position:relative}
.balance-card::before{content:'';position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.06)}
.bal-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;opacity:.7;margin-bottom:4px}
.bal-amount{font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:18px;position:relative;z-index:1}
.bal-row{display:flex;gap:10px;position:relative;z-index:1}
.bal-sub{flex:1;background:rgba(255,255,255,.13);border-radius:10px;padding:10px 12px}
.bal-sub-label{font-size:10px;opacity:.65;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.bal-sub-val{font-size:17px;font-weight:700}

/* PERIOD */
.period-wrap{background:#16161f;border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:14px;margin-bottom:14px}
.period-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.period-head{font-size:12px;font-weight:700;color:#9090b0}
.period-info{font-size:11px;color:#6c63ff;font-weight:600}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#555570;border:1px solid rgba(255,255,255,.09);transition:all .2s}
.chip.active{background:rgba(108,99,255,.2);color:#8b84ff;border-color:rgba(108,99,255,.35)}
.date-range{display:flex;gap:8px;align-items:center;margin-top:10px}
.date-inp{flex:1;background:#1a1a28;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 10px;font-size:13px;color:#f0f0ff}

/* PAYMENT CARDS — equal height */
.payment-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.payment-card{background:#16161f;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:6px}
.payment-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;align-self:flex-start}
.badge-kaspi{background:rgba(232,56,42,.12);color:#e8382a}
.badge-freedom{background:rgba(0,180,100,.12);color:#00b464}
.badge-income{background:rgba(0,212,160,.12);color:#00d4a0}
.payment-amount{font-size:20px;font-weight:700;letter-spacing:-.5px}
.payment-sub{font-size:11px;color:#555570}

/* CHARTS */
.chart-wrap{background:#16161f;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;margin-bottom:14px}
.chart-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.chart-title small{font-size:11px;color:#555570;font-weight:400}
svg.chart{width:100%;display:block}
.legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#9090b0}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* TXN */
.txn-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.txn-item:last-child{border-bottom:none}
.txn-item:hover{opacity:.8}
.txn-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.txn-name{font-size:14px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-meta{font-size:11px;color:#555570;display:flex;align-items:center;gap:6px}
.txn-info{flex:1;min-width:0}
.txn-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.txn-amt{font-size:15px;font-weight:700}
.txn-amt.exp{color:#ff5c7a}
.txn-amt.inc{color:#00d4a0}
.del-btn{font-size:13px;color:#333350;padding:3px 6px;border-radius:6px}
.del-btn:hover{color:#ff5c7a}

/* CAT */
.cat-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.cat-row:last-child{border-bottom:none}
.cat-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cat-bar-bg{height:3px;background:#1a1a28;border-radius:2px;margin-top:4px}

/* BUDGET */
.bud-item{background:#16161f;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:13px;margin-bottom:9px;cursor:pointer;transition:border-color .2s}
.bud-item.over{border-color:rgba(255,92,122,.4)}
.bud-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.bud-prog{height:5px;background:#1a1a28;border-radius:3px;overflow:hidden;margin-bottom:8px}
.bud-fill{height:5px;border-radius:3px;transition:width .5s}
.bud-ft{display:flex;justify-content:space-between;font-size:11px;color:#555570}
.bud-ft b{color:#f0f0ff;font-weight:700}
.over-tag{font-size:10px;font-weight:700;color:#ff5c7a;background:rgba(255,92,122,.12);padding:2px 8px;border-radius:10px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:#444460;pointer-events:none}
.search-inp{width:100%;background:#16161f;border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:11px 12px 11px 38px;font-size:14px;color:#f0f0ff}
.search-inp::placeholder{color:#444460}
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;color:#555570;border:1px solid rgba(255,255,255,.09);transition:all .2s}
.filter-btn.active{background:rgba(108,99,255,.15);color:#8b84ff;border-color:rgba(108,99,255,.3)}

/* DRAG */
.drag-row{display:flex;align-items:center;gap:10px;background:#16161f;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 12px;margin-bottom:8px;transition:border-color .15s}
.drag-row.dover{border-color:#6c63ff;background:rgba(108,99,255,.08)}
.drag-handle{color:#333350;font-size:16px;cursor:grab;user-select:none;padding:4px 6px;touch-action:none}
.drag-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ia{font-size:14px;padding:6px 8px;color:#444460;transition:color .15s}
.ia:hover{color:#f0f0ff}
.ia.del:hover{color:#ff5c7a}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
@media(max-width:767px){.overlay{align-items:flex-end;padding:0}}
.modal{background:#111119;border-radius:16px;padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
@media(max-width:767px){.modal{border-radius:16px 16px 0 0;max-width:100%;padding:20px 20px 32px}}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto 20px;display:none}
@media(max-width:767px){.modal-handle{display:block}}
.modal-title{font-size:18px;font-weight:700;margin-bottom:18px}
.flabel{font-size:11px;font-weight:700;color:#9090b0;text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:7px}
.finp{width:100%;background:#1a1a28;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px;font-size:15px;color:#f0f0ff;margin-bottom:14px;transition:border-color .2s}
.finp:focus{border-color:#6c63ff}
.fsel{width:100%;background:#1a1a28;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px;font-size:14px;color:#f0f0ff;margin-bottom:14px;appearance:none}
.fsel:focus{border-color:#6c63ff;outline:none}
.type-toggle{display:flex;background:#1a1a28;border-radius:10px;padding:3px;margin-bottom:14px}
.type-btn{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:700;color:#555570;transition:all .2s}
.type-btn.exp{background:rgba(255,92,122,.15);color:#ff5c7a}
.type-btn.inc{background:rgba(0,212,160,.12);color:#00d4a0}
.amt-wrap{position:relative;margin-bottom:14px}
.amt-prefix{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:22px;font-weight:700;color:#444460}
.amt-inp{width:100%;background:#1a1a28;border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:13px 13px 13px 38px;font-size:28px;font-weight:700;color:#f0f0ff;letter-spacing:-1px;transition:border-color .2s}
.amt-inp:focus{border-color:#6c63ff}
.row2{display:flex;gap:10px;margin-bottom:14px}
.row2 .fsel{margin-bottom:0}
.dq-row{display:flex;gap:6px;margin-bottom:12px}
.dq-btn{flex:1;padding:8px 4px;border-radius:8px;font-size:11px;font-weight:700;background:#1a1a28;color:#555570;border:1px solid rgba(255,255,255,.08);transition:all .15s}
.dq-btn.active{background:rgba(108,99,255,.2);color:#8b84ff;border-color:rgba(108,99,255,.35)}
.btn-primary{width:100%;background:#6c63ff;color:#fff;border-radius:12px;padding:14px;font-size:15px;font-weight:700;margin-top:6px;transition:opacity .15s}
.btn-primary:hover{opacity:.9}
.btn-danger{width:100%;background:rgba(255,92,122,.15);color:#ff5c7a;border:1px solid rgba(255,92,122,.25);border-radius:12px;padding:14px;font-size:15px;font-weight:700;margin-top:8px}
.btn-ghost{width:100%;background:#1a1a28;color:#9090b0;border-radius:12px;padding:14px;font-size:15px;font-weight:700;margin-top:8px}
.icon-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px}
.ico-btn{aspect-ratio:1;background:#1a1a28;border:1.5px solid rgba(255,255,255,.08);border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ico-btn.sel{border-color:#6c63ff;background:rgba(108,99,255,.2)}
.clr-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.clr-dot{width:30px;height:30px;border-radius:50%;border:2.5px solid transparent;transition:transform .15s;cursor:pointer}
.clr-dot.sel{transform:scale(1.25);border-color:#fff}
.prev-row{display:flex;align-items:center;gap:10px;background:#1a1a28;border-radius:10px;padding:10px 14px;margin-bottom:14px}
.prev-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:19px}
.danger-zone{background:rgba(255,92,122,.08);border:1px solid rgba(255,92,122,.15);border-radius:12px;padding:14px;margin-top:20px}
.page-title{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:18px}
.section-label{font-size:11px;font-weight:700;color:#555570;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.empty{text-align:center;padding:60px 20px}
.empty-ico{font-size:48px;opacity:.2;display:block;margin-bottom:14px}
.empty-title{font-size:17px;font-weight:700;color:#666688;margin-bottom:6px}
.empty-desc{font-size:13px;color:#444460;line-height:1.6}
.range-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.range-row input{flex:1;accent-color:#6c63ff}
.range-val{font-size:10px;color:#555570;min-width:55px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#00d4a0;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.stat-label{font-size:10px;color:#666688;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:2px}
.stat-sub{font-size:11px;color:#555570}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<body>

<!-- AUTH -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">Tens<b>es</b>FIN</div>
    <div class="auth-sub">Личный финансовый трекер</div>
    <div class="sync-info">
      <b>🔄 Синхронизация между устройствами</b><br>
      Войдите с одним логином на телефоне и ноутбуке — данные синхронизируются автоматически.
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" id="tabReg" onclick="switchTab('reg')">Регистрация</button>
    </div>
    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input class="form-inp" type="text" id="loginUser" placeholder="Ваш логин" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-inp" type="password" id="loginPass" placeholder="Ваш пароль" autocomplete="current-password">
      </div>
      <button class="auth-btn" onclick="doLogin()">Войти</button>
    </div>
    <div id="regForm" style="display:none">
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input class="form-inp" type="text" id="regUser" placeholder="Придумайте логин" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-inp" type="password" id="regPass" placeholder="Придумайте пароль" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Имя (отображается в приложении)</label>
        <input class="form-inp" type="text" id="regName" placeholder="Ваше имя">
      </div>
      <button class="auth-btn" onclick="doRegister()">Создать аккаунт</button>
    </div>
    <div class="auth-err" id="authErr"></div>
    <div class="auth-note">
      💡 Данные хранятся локально + синхронизируются через общий ключ.<br>
      Используйте один логин на всех устройствах.
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appScreen">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
  <nav class="mob-nav" id="mobnav"></nav>
  <button class="fab" id="fab">＋</button>
</div>

<script>
// ═══════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════

var firebaseConfig = {
  apiKey: "AIzaSyB34npO0NkojR6h6_iv3oLvgIXeLnwZR9s",
  authDomain: "tensesfin.firebaseapp.com",
  projectId: "tensesfin",
  storageBucket: "tensesfin.firebasestorage.app",
  messagingSenderId: "194905438732",
  appId: "1:194905438732:web:370c522fd48af59f578c29"

// PERIOD
// ═══════════════════════════════
// offset=0 current, offset=-1 previous, offset=1 next salary period
function salaryPeriod(offset){
  offset=offset||0;
  var now=new Date(),d=now.getDate(),m=now.getMonth(),y=now.getFullYear();
  // Find base period start month
  if(d<10){m--;if(m<0){m=11;y--;}}
  // Apply offset
  m+=offset;
  while(m>11){m-=12;y++;}
  while(m<0){m+=12;y--;}
  var em=m+1,ey=y;if(em>11){em=0;ey++;}
  var label=MONTHS[m]+' '+y+' — '+MONTHS[em]+' '+ey;
  return{start:y+'-'+pad(m+1)+'-10',end:ey+'-'+pad(em+1)+'-09',label:label,offset:offset};
}
function salaryPeriodLabel(offset){
  var sp=salaryPeriod(offset);
  if(offset===0)return'Текущий: '+sp.label;
  if(offset===-1)return'Прошлый: '+sp.label;
  if(offset===1)return'Следующий: '+sp.label;
  return sp.label;
}
function periodRange(f){
  var now=new Date(),t=todayStr();
  if(f==='today')return{start:t,end:t};
  if(f==='week'){
    var d=new Date(now),day=d.getDay(),diff=day===0?-6:1-day;
    d.setDate(d.getDate()+diff);
    return{start:d.toISOString().slice(0,10),end:t};
  }
  if(f==='month')return{start:now.getFullYear()+'-'+pad(now.getMonth()+1)+'-01',end:t};
  if(f==='salary')return salaryPeriod();
  return null;
}
function filterTxns(txns,f,cs,ce,salaryOffset){
  if(f==='custom'){
    if(!cs||!ce)return txns;
    var s=cs<ce?cs:ce,e=cs<ce?ce:cs;
    return txns.filter(function(t){return t.date>=s&&t.date<=e;});
  }
  var r;
  if(f==='salary'){r=salaryPeriod(salaryOffset||0);}
  else{r=periodRange(f);}
  if(!r)return txns;
  return txns.filter(function(t){return t.date>=r.start&&t.date<=r.end;});
}

function formatDate(d){
  // d = "2025-01-15"
  var parts=d.split('-');
  return parts[2]+' '+MONTHS_F[parseInt(parts[1],10)-1]+' '+parts[0];
}
function periodLabel(f,cs,ce){
  if(f==='today'){var t=todayStr();return formatDate(t);}
  if(f==='week'){
    var now=new Date(),day=now.getDay(),diff=day===0?-6:1-day;
    var s=new Date(now);s.setDate(now.getDate()+diff);
    return formatDate(s.toISOString().slice(0,10))+' — '+formatDate(todayStr());
  }
  if(f==='month'){
    var now2=new Date();
    return '1 '+MONTHS_F[now2.getMonth()]+' '+now2.getFullYear()+' — '+formatDate(todayStr());
  }
  if(f==='salary'){var sp=salaryPeriod(arguments[3]||0);return formatDate(sp.start)+' — '+formatDate(sp.end);}
  if(f==='all')return 'Все данные';
  if(f==='custom'){
    if(!cs||!ce)return 'Выберите даты';
    var s2=cs<ce?cs:ce,e2=cs<ce?ce:cs;
    return formatDate(s2)+' — '+formatDate(e2);
  }
  return '';
}

function buildDays(n){
  var days={};
  for(var i=n-1;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var k=d.toISOString().slice(0,10);
    days[k]={label:DAYS[d.getDay()]+' '+d.getDate()+'/'+pad(d.getMonth()+1),full:DAYS[d.getDay()]+', '+d.getDate()+' '+MONTHS[d.getMonth()],exp:0,inc:0,kaspi:0,freedom:0};
  }
  DB.txns.forEach(function(t){
    if(!days[t.date])return;
    if(t.payment==='income')days[t.date].inc+=t.amount;
    else{days[t.date].exp+=t.amount;if(t.payment==='kaspi')days[t.date].kaspi+=t.amount;else days[t.date].freedom+=t.amount;}
  });
  return Object.values(days);
}

function lineChart(data,keys,colors,h){
  var W=760,H=h*2,pL=56,pR=8,pT=20,pB=44,cW=W-pL-pR,cH=H-pT-pB,n=data.length;
  if(n<2)return '<div style="height:'+h+'px;display:flex;align-items:center;justify-content:center;color:#333350;font-size:13px">Недостаточно данных</div>';
  var vals=[];data.forEach(function(d){keys.forEach(function(k){vals.push(d[k]||0);});});
  var maxV=Math.max.apply(null,vals.concat([1]));
  function xp(i){return pL+i/(n-1)*cW;}
  function yp(v){return pT+cH-(v/maxV)*cH;}
  var s='<svg viewBox="0 0 '+W+' '+H+'" class="chart" style="height:'+h+'px">';
  s+='<defs>';
  keys.forEach(function(k,i){
    s+='<linearGradient id="lg'+k+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+colors[i]+'" stop-opacity="0.3"/><stop offset="100%" stop-color="'+colors[i]+'" stop-opacity="0"/></linearGradient>';
  });
  s+='</defs>';
  [0,0.5,1].forEach(function(f){
    var y=pT+cH*(1-f);
    s+='<line x1="'+pL+'" x2="'+(W-pR)+'" y1="'+y+'" y2="'+y+'" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>';
    if(f>0)s+='<text x="'+(pL-6)+'" y="'+(y+5)+'" text-anchor="end" fill="#444460" font-size="16" font-family="sans-serif">'+fmtk(maxV*f)+'</text>';
  });
  data.forEach(function(d,i){
    if(n>10&&i%2!==0&&i!==n-1)return;
    var x=xp(i),parts=d.label.split(' ');
    s+='<text x="'+x+'" y="'+(H-24)+'" text-anchor="middle" fill="#444460" font-size="15" font-family="sans-serif">'+parts[0]+'</text>';
    s+='<text x="'+x+'" y="'+H+'" text-anchor="middle" fill="#444460" font-size="15" font-family="sans-serif">'+(parts[1]||'')+'</text>';
  });
  keys.forEach(function(k,ki){
    var pts=data.map(function(d,i){return{x:xp(i),y:yp(d[k]||0)};});
    var aD='M '+pts[0].x+' '+(pT+cH)+pts.map(function(p){return ' L '+p.x+' '+p.y;}).join('')+' L '+pts[pts.length-1].x+' '+(pT+cH)+' Z';
    s+='<path d="'+aD+'" fill="url(#lg'+k+')" />';
    var lD='M '+pts.map(function(p){return p.x+' '+p.y;}).join(' L ');
    s+='<path d="'+lD+'" fill="none" stroke="'+colors[ki]+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
    pts.forEach(function(p){s+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+colors[ki]+'"/>';});
  });
  return s+'</svg>';
}

function barChart(data,keys,colors,h){
  var W=760,H=h*2,pL=56,pR=8,pT=40,pB=44,cW=W-pL-pR,cH=H-pT-pB,n=data.length;
  if(!n)return '';
  var vals=[];data.forEach(function(d){keys.forEach(function(k){vals.push(d[k]||0);});});
  var maxV=Math.max.apply(null,vals.concat([1]));
  var gW=cW/n,bW=Math.min(gW*0.35,36);
  var s='<svg viewBox="0 0 '+W+' '+H+'" class="chart" style="height:'+h+'px;touch-action:pan-y">';
  [0,0.5,1].forEach(function(f){
    var y=pT+cH*(1-f);
    s+='<line x1="'+pL+'" x2="'+(W-pR)+'" y1="'+y+'" y2="'+y+'" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>';
    if(f>0)s+='<text x="'+(pL-6)+'" y="'+(y+5)+'" text-anchor="end" fill="#444460" font-size="16" font-family="sans-serif">'+fmtk(maxV*f)+'</text>';
  });
  data.forEach(function(d,i){
    var gx=pL+i*gW+gW/2;
    // Invisible wide hit area for clicking
    s+='<rect x="'+(pL+i*gW)+'" y="'+pT+'" width="'+gW+'" height="'+cH+'" fill="transparent" style="cursor:pointer" onclick="showBarDetail('+i+')" onmouseover="this.style.fill='rgba(255,255,255,0.04)'" onmouseout="this.style.fill='transparent'"/>';
    keys.forEach(function(k,ki){
      var v=d[k]||0,bh=Math.max((v/maxV)*cH,0);
      var bx=gx+(ki-keys.length/2+0.5)*(bW+3)-bW/2;
      if(bh>0)s+='<rect x="'+bx+'" y="'+(pT+cH-bh)+'" width="'+bW+'" height="'+bh+'" fill="'+colors[ki]+'" rx="3" style="pointer-events:none"/>';
      if(v>0)s+='<text x="'+(bx+bW/2)+'" y="'+(pT+cH-bh-6)+'" text-anchor="middle" fill="#777798" font-size="14" font-family="sans-serif" style="pointer-events:none">'+fmtk(v)+'</text>';
    });
    if(n<=12||i%2===0){
      var parts=d.label.split(' ');
      s+='<text x="'+gx+'" y="'+(H-24)+'" text-anchor="middle" fill="#444460" font-size="15" font-family="sans-serif" style="pointer-events:none">'+parts[0]+'</text>';
      s+='<text x="'+gx+'" y="'+H+'" text-anchor="middle" fill="#444460" font-size="15" font-family="sans-serif" style="pointer-events:none">'+(parts[1]||'')+'</text>';
    }
  });
  return s+'</svg>';
}

  s+='<text id="'+uid+'_tn" font-size="14" font-family="sans-serif" fill="#f0f0ff" font-weight="700"/>';
  s+='<text id="'+uid+'_tv" font-size="12" font-family="sans-serif" fill="#9090b0"/>';
  s+='</g>';
  slices.forEach(function(sl,si){
    var a=sl.value/total*Math.PI*2;
    if(a<0.01){angle+=a;return;}
    var x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    var x2=cx+R*Math.cos(angle+a),y2=cy+R*Math.sin(angle+a);
    var ix1=cx+r*Math.cos(angle),iy1=cy+r*Math.sin(angle);
    var ix2=cx+r*Math.cos(angle+a),iy2=cy+r*Math.sin(angle+a);
    var lg=a>Math.PI?1:0;
    var pct=Math.round(sl.value/total*100);
    var safeN=sl.name.replace(/'/g,'&apos;');
    var safeV='\u20b8'+fmt(sl.value)+' ('+pct+'%)';
    s+='<path d="M '+x1+' '+y1+' A '+R+' '+R+' 0 '+lg+' 1 '+x2+' '+y2+' L '+ix2+' '+iy2+' A '+r+' '+r+' 0 '+lg+' 0 '+ix1+' '+iy1+' Z"';
    s+=' fill="'+sl.color+'" style="cursor:pointer;transition:opacity .15s"';
    s+=' data-n="'+esc(sl.name)+'" data-v="\u20b8'+fmt(sl.value)+' ('+pct+'%)"';
    s+=' onmouseenter="donutHover(this,\''+uid+'\')" onmouseleave="donutOut(\''+uid+'\')"';
    s+='/>';
    angle+=a;
  });
  s+='</svg>';
  return s;
}
function donutHover(path,uid){
  path.style.opacity='0.75';
  path.style.transform='scale(1.03)';
  path.style.transformOrigin='center';
  var tip=document.getElementById(uid+'_tip');
  var tr=document.getElementById(uid+'_tr');
  var tn=document.getElementById(uid+'_tn');
  var tv=document.getElementById(uid+'_tv');
  if(!tip)return;
  var n=path.dataset.n,v=path.dataset.v;
  tn.textContent=n; tv.textContent=v;
  var nw=Math.max(n.length,v.length)*8+16;
  tn.setAttribute('x',8); tn.setAttribute('y',20);
  tv.setAttribute('x',8); tv.setAttribute('y',36);
  tr.setAttribute('width',nw); tr.setAttribute('height',46);
  tip.setAttribute('transform','translate(5,'+-10+')');
  tip.style.display='';
}
function donutOut(uid){
  var tip=document.getElementById(uid+'_tip');
  if(tip)tip.style.display='none';
  document.querySelectorAll('#'+uid+' path').forEach(function(p){p.style.opacity='1';p.style.transform='';});
}

function periodWidget(f,cs,ce,prefix,salaryOffset){
  salaryOffset=salaryOffset||0;
  var chips=[{v:'today',l:'День'},{v:'week',l:'Неделя'},{v:'month',l:'Месяц'},{v:'salary',l:'🗓 Зарплата'},{v:'all',l:'Всё время'},{v:'custom',l:'Свой период'}];
  var sp=salaryPeriod(salaryOffset);
  var info=f==='salary'?(formatDate(sp.start)+' — '+formatDate(sp.end)):periodLabel(f,cs,ce);
  var h='<div class="period-wrap">';
  h+='<div class="period-top"><span class="period-head">📅 Период</span>';
  if(info)h+='<span class="period-info">'+esc(info)+'</span>';
  h+='</div><div class="chips">';
  chips.forEach(function(c){h+='<button class="chip'+(f===c.v?' active':'')+'" onclick="setPeriod(\''+prefix+'\',\''+c.v+'\')">'+c.l+'</button>';});
  h+='</div>';
  // Salary navigator
  if(f==='salary'){
    var prevLabel=salaryPeriodLabel(salaryOffset-1);
    var currLabel=salaryOffset===0?'Текущий':salaryOffset===-1?'Прошлый':salaryOffset===1?'Следующий':'Период '+(salaryOffset>0?'+':'')+salaryOffset;
    var nextLabel=salaryPeriodLabel(salaryOffset+1);
    h+='<div style="display:flex;align-items:center;gap:8px;margin-top:10px">';
    h+='<button onclick="setSalaryOffset(\''+prefix+'\','+(salaryOffset-1)+')" style="background:#1a1a28;border:1px solid rgba(255,255,255,.1);color:#9090b0;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0">◀</button>';
    h+='<div style="flex:1;text-align:center">';
    h+='<div style="font-size:12px;font-weight:700;color:'+(salaryOffset===0?'#6c63ff':salaryOffset>0?'#ffb84d':'#9090b0')+'">'+currLabel+'</div>';
    h+='<div style="font-size:11px;color:#555570;margin-top:2px">'+esc(sp.label)+'</div>';
    h+='</div>';
    h+='<button onclick="setSalaryOffset(\''+prefix+'\','+(salaryOffset+1)+')" style="background:#1a1a28;border:1px solid rgba(255,255,255,.1);color:#9090b0;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0">▶</button>';
    h+='</div>';
  }
  if(f==='custom'){
    h+='<div class="date-range"><input type="date" class="date-inp" value="'+(cs||'')+'" onchange="setPeriodDate(\''+prefix+'\',\'cs\',this.value)"><span style="color:#444460">—</span><input type="date" class="date-inp" value="'+(ce||'')+'" onchange="setPeriodDate(\''+prefix+'\',\'ce\',this.value)"></div>';
  }
  return h+'</div>';
}
function setSalaryOffset(prefix,offset){
  if(prefix==='d')S.dSalaryOffset=offset;
  else if(prefix==='a')S.aSalaryOffset=offset;
  else if(prefix==='b')S.bSalaryOffset=offset;
  else if(prefix==='o')S.oSalaryOffset=offset;
  render();
}

function setPeriod(p,v){
  if(p==='d')S.dPeriod=v; else if(p==='a')S.aPeriod=v; else if(p==='b')S.bPeriod=v; else if(p==='o')S.oPeriod=v;
  render();
};
function setPeriodDate(p,f,v){
  if(p==='d'){if(f==='cs')S.dCs=v;else S.dCe=v;}
  else if(p==='a'){if(f==='cs')S.aCs=v;else S.aCe=v;}

};

function pageBudget(){
  var _bsp=salaryPeriod(S.bSalaryOffset);
  var _bPeriodKey=S.bPeriod==='salary'?(_bsp.start+'_'+_bsp.end):'all';
  var txns=filterTxns(DB.txns,S.bPeriod,S.bCs,S.bCe,S.bSalaryOffset).filter(function(t){return t.payment!=='income';});
  var catSpend={};txns.forEach(function(t){catSpend[t.catId]=(catSpend[t.catId]||0)+t.amount;});
  var totalSpent=txns.reduce(function(s,t){return s+t.amount;},0);
  var totalBudget=DB.cats.reduce(function(s,c){
    var bk=(_bPeriodKey!=='all')?(c.id+'_'+_bPeriodKey):c.id;
    return s+(DB.budgets[bk]||0);
  },0);
  var h='<div class="page-title">Бюджет</div>';
  h+=periodWidget(S.bPeriod,S.bCs,S.bCe,'b',S.bSalaryOffset);
  h+='<div class="card" style="margin-bottom:14px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:14px;font-weight:700">Общий бюджет</span>';
  if(totalBudget>0){var tp=Math.round(totalSpent/totalBudget*100);h+='<span style="font-size:12px;font-weight:700;color:'+(totalSpent>totalBudget?'#ff5c7a':tp>80?'#ffb84d':'#00d4a0')+'">'+tp+'%</span>';}
  h+='</div><div style="display:flex;justify-content:space-between;margin-bottom:10px">';
  h+='<div><div class="stat-label">Запланировано</div><div style="font-size:20px;font-weight:700;color:#6c63ff">₸'+fmt(totalBudget)+'</div></div>';
  h+='<div style="text-align:right"><div class="stat-label">Потрачено</div><div style="font-size:20px;font-weight:700;color:'+(totalSpent>totalBudget?'#ff5c7a':'#f0f0ff')+'">₸'+fmt(totalSpent)+'</div></div></div>';
  if(totalBudget>0){
    var pct2=Math.min(totalSpent/totalBudget*100,100);
    h+='<div class="bud-prog"><div class="bud-fill" style="width:'+pct2+'%;background:'+(totalSpent>totalBudget?'#ff5c7a':pct2>80?'#ffb84d':'#00d4a0')+'"></div></div>';
    h+='<div style="font-size:12px;color:#555570;text-align:right;margin-top:4px">'+(totalSpent>totalBudget?'⚠️ Превышен на ₸'+fmt(totalSpent-totalBudget):'Остаток: ₸'+fmt(totalBudget-totalSpent))+'</div>';
  }
  h+='</div><div style="font-size:11px;color:#444460;margin-bottom:10px">Нажмите на категорию чтобы задать лимит</div>';
  DB.cats.forEach(function(cat){
    var _bk=(_bPeriodKey!=='all')?cat.id+'_'+_bPeriodKey:cat.id;
    var limit=DB.budgets[_bk]||0,spent=catSpend[cat.id]||0;
    var pct=limit?Math.min(Math.round(spent/limit*100),100):0,over=limit>0&&spent>limit;
    var bc=over?'#ff5c7a':pct>80?'#ffb84d':cat.color;
    h+='<div class="bud-item'+(over?' over':'')+'" onclick="openBudget(\''+cat.id+'\')">';
    h+='<div class="bud-hd"><div style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700">'+cat.icon+' '+esc(cat.name)+'</div>';
    h+=(over?'<span class="over-tag">⚠️ Превышен</span>':'<span style="font-size:13px;font-weight:700;color:'+(pct>80?'#ffb84d':'#666688')+'">'+(limit?pct+'%':'—')+'</span>')+'</div>';
    h+='<div class="bud-prog"><div class="bud-fill" style="width:'+pct+'%;background:'+bc+'"></div></div>';
    var остаток = limit - spent;
  h+='<div class="bud-ft" style=\'display:flex;justify-content:space-between;gap:6px\'>';
  h+='<span>Потрачено <b>₸'+fmt(spent)+'</b></span>';
  if(limit > 0){
    h+= остаток >= 0
      ? '<span style=\'color:#00d4a0\'>Остаток <b>₸'+fmt(остаток)+'</b></span>'
      : '<span style=\'color:#ff5c7a\'>Перерасход <b>₸'+fmt(Math.abs(остаток))+'</b></span>';
    h+='<span>Лимит <b>₸'+fmt(limit)+'</b></span>';
  } else {
    h+='<span style=\'color:#6c63ff;font-weight:700\'>Задать лимит</span>';
  }
  h+='</div></div>';
  });
  return h;
}

function setAStart(v){
  if(v < S.aRangeEnd){ S.aRangeStart=v; renderMain(); }
}
function setAEnd(v){
  if(v > S.aRangeStart){ S.aRangeEnd=v; renderMain(); }
}
function dragStart(i){S.dragIdx=i;};
function dragHover(i){if(S.dragOver!==i){S.dragOver=i;renderMain();}};
function dragDrop(i){
  if(S.dragIdx!==null&&S.dragIdx!==i){
    var c=DB.cats.slice(),m=c.splice(S.dragIdx,1)[0];c.splice(i,0,m);DB.cats=c;saveDB();
  }
  S.dragIdx=null;S.dragOver=null;renderMain();
};
function dragEnd(){S.dragIdx=null;S.dragOver=null;renderMain();};
function touchDragStart(e,i){S.dragIdx=i;e.stopPropagation();};
function touchDragMove(e){
  e.preventDefault();
  var y=e.touches[0].clientY,rows=document.querySelectorAll('.drag-row'),closest=S.dragIdx,minD=999999;
  rows.forEach(function(r,i){var rc=r.getBoundingClientRect(),mid=rc.top+rc.height/2,d=Math.abs(y-mid);if(d<minD){minD=d;closest=i;}});
  if(S.dragOver!==closest){S.dragOver=closest;renderMain();}
};
function touchDragEnd(){
  if(S.dragIdx!==null&&S.dragOver!==null&&S.dragIdx!==S.dragOver){
    var c=DB.cats.slice(),m=c.splice(S.dragIdx,1)[0];c.splice(S.dragOver,0,m);DB.cats=c;saveDB();
  }
  S.dragIdx=null;S.dragOver=null;renderMain();
};

function openEditTxn(id){
  var t=DB.txns.find(function(x){return x.id===id;});if(!t)return;
  S.mEditId=id;S.mType=t.payment==='income'?'income':'expense';S.mAmt=String(t.amount);
  S.mCatId=t.catId;S.mPayment=t.payment==='income'?'kaspi':t.payment;
  S.mDate=t.date;S.mDateQ='__custom';S.mNote=t.note||'';
  S.mIncCat=t.payment==='income'?t.catId:'salary';
  openModal('txn');
};
function openAddTxn(){
  S.mEditId=null;S.mType='expense';S.mAmt='';
  S.mCatId=DB.cats[0]?DB.cats[0].id:'';S.mPayment='kaspi';
  S.mDate=todayStr();S.mDateQ='today';S.mNote='';S.mIncCat='salary';
  openModal('txn');
};
function openBudget(catId){
  S.mbCatId=catId;
  var sp=salaryPeriod(S.bSalaryOffset);
  var bk=S.bPeriod==='salary'?(catId+'_'+sp.start+'_'+sp.end):catId;
  S.mbBudgetKey=bk;
  S.mbVal=String(DB.budgets[bk]||(DB.budgets[catId]||''));
  openModal('budget');
};
function openCatModal(id){
  if(id){var c=DB.cats.find(function(x){return x.id===id;});if(!c)return;S.mcEditId=id;S.mcName=c.name;S.mcIcon=c.icon;S.mcColor=c.color;}
  else{S.mcEditId=null;S.mcName='';S.mcIcon='📦';S.mcColor='#6c63ff';}
  openModal('cat');
};
function confirmDel(id){S.mEditId=id;openModal('del_txn');};
function confirmDelCat(id){S.mcEditId=id;openModal('del_cat');};
function setDateQ(v){
  S.mDateQ=v;
  if(v==='today')S.mDate=todayStr();
  else if(v==='yest')S.mDate=daysAgo(1);
  else if(v==='day2')S.mDate=daysAgo(2);
  renderModal();
};
function updateCatPreview(){
  var pi=document.getElementById('prevIco'),pn=document.getElementById('prevName');
  if(pi){pi.textContent=S.mcIcon;pi.style.background=S.mcColor+'33';}
  if(pn)pn.textContent=S.mcName||'Предпросмотр';
};
function submitTxn(){
  var amt=parseFloat(S.mAmt);if(!amt||amt<=0)return;
  var data={amount:amt,date:S.mDate,note:(S.mNote||'').trim(),catId:S.mType==='income'?S.mIncCat:S.mCatId,payment:S.mType==='income'?'income':S.mPayment};
  if(S.mEditId)DB.txns=DB.txns.map(function(t){return t.id===S.mEditId?Object.assign({},t,data):t;});
  else DB.txns.unshift(Object.assign({id:Date.now()+String(Math.random()).slice(2,6)},data));
  saveDB();closeModal();render();
};
function submitCat(){
  if(!S.mcName.trim())return;
  if(S.mcEditId)DB.cats=DB.cats.map(function(c){return c.id===S.mcEditId?Object.assign({},c,{name:S.mcName.trim(),icon:S.mcIcon,color:S.mcColor}):c;});
  else DB.cats.push({id:'c_'+Date.now(),name:S.mcName.trim(),icon:S.mcIcon,color:S.mcColor});
  saveDB();closeModal();renderMain();
};
function submitBudget(){
  var v=parseFloat(S.mbVal);if(isNaN(v)||v<0)return;
  var key=S.mbBudgetKey||S.mbCatId;
  DB.budgets[key]=v;saveDB();closeModal();renderMain();
};
function delTxn(){DB.txns=DB.txns.filter(function(t){return t.id!==S.mEditId;});saveDB();closeModal();render();};
function delCat(){DB.cats=DB.cats.filter(function(c){return c.id!==S.mcEditId;});saveDB();closeModal();renderMain();};
function resetAll(){lsSet(ukey('txns'),[]);lsSet(ukey('cats'),null);lsSet(ukey('budgets'),{});loadDB();closeModal();render();};

function modalBarDetail(){

  var catArr=Object.keys(catMap).map(function(id){
    var c=getCat(id);return{name:c.name,icon:c.icon,color:c.color,amount:catMap[id]};

  COLORS.forEach(function(c){h+='<div class="clr-dot'+(S.mcColor===c?' sel':'')+'" style="background:'+c+'" onclick="S.mcColor=\''+c+'\';document.querySelectorAll(\'.clr-dot\').forEach(function(d){d.classList.remove(\'sel\')});this.classList.add(\'sel\');updateCatPreview()"></div>';});
  h+='</div><div class="prev-row" id="catPreview"><div class="prev-ico" id="prevIco" style="background:'+S.mcColor+'33">'+S.mcIcon+'</div><span style="font-size:14px;font-weight:700" id="prevName">'+(S.mcName||'Предпросмотр')+'</span></div>';
  h+='<button class="btn-primary" onclick="submitCat()">'+(S.mcEditId?'Сохранить':'Добавить')+'</button><button class="btn-ghost" onclick="closeModal()">Отмена</button>';
  return h;
}

function modalBudget(){
  var cat=DB.cats.find(function(c){return c.id===S.mbCatId;})||{icon:'📦',name:'Категория'};
  var h='<div class="modal-handle"></div><div class="modal-title">'+cat.icon+' '+esc(cat.name)+'</div>';
  h+='<label class="flabel">Лимит на период (₸)</label>';
  h+='<input class="finp" type="number" inputmode="decimal" placeholder="Например: 50000" value="'+esc(S.mbVal)+'" oninput="S.mbVal=this.value">';
  h+='<button class="btn-primary" onclick="submitBudget()">Сохранить</button>';
  if(DB.budgets[S.mbBudgetKey]||DB.budgets[S.mbCatId])h+='<button class="btn-ghost" onclick="delete DB.budgets[S.mbBudgetKey];saveDB();closeModal();renderMain()">Убрать лимит</button>';
  h+='<button class="btn-ghost" onclick="closeModal()">Отмена</button>';
  return h;
}

function modalConfirm(title,desc,onOk){
  return '<div class="modal-handle"></div><div class="modal-title">'+title+'</div><p style="color:#9090b0;font-size:14px;line-height:1.6;margin-bottom:16px">'+desc+'</p><button class="btn-danger" onclick="'+onOk+'">Да, удалить</button><button class="btn-ghost" onclick="closeModal()">Отмена</button>';
}

// ═══════════════════════════════
// RENDER
// ═══════════════════════════════
function renderSidebar(){
  var u=CURRENT_USER||'';
  var _s=lsGet('tsf_session',{});
  var name=_s.name||u;
  var av=name.charAt(0).toUpperCase();
  var tabs=[{id:'home',icon:'🏠',label:'Главная'},{id:'ops',icon:'📋',label:'Операции'},{id:'analytics',icon:'📊',label:'Аналитика'},{id:'budget',icon:'🎯',label:'Бюджет'},{id:'settings',icon:'⚙️',label:'Настройки'}];
  var h='<div class="logo">Tens<b>es</b>FIN<span class="logo-sub">личные финансы</span></div>';
  tabs.forEach(function(t){h+='<button class="nav-link'+(S.tab===t.id?' active':'')+'" onclick="go(\''+t.id+'\')"><span class="nav-icon">'+t.icon+'</span>'+t.label+'</button>';});
  h+='<div class="sidebar-bottom"><div class="user-row"><div class="user-avatar">'+av+'</div><div class="user-name">'+esc(name)+'</div><button class="logout-btn" onclick="doLogout()" title="Выйти">⎋</button></div>';
  h+='<button class="btn-add-sb" onclick="openAddTxn()">＋ Новая операция</button></div>';
  document.getElementById('sidebar').innerHTML=h;
}
function renderMobNav(){
  var tabs=[{id:'home',icon:'🏠',label:'Главная'},{id:'ops',icon:'📋',label:'Операции'},{id:'analytics',icon:'📊',label:'Аналитика'},{id:'budget',icon:'🎯',label:'Бюджет'},{id:'settings',icon:'⚙️',label:'Настройки'}];
  var h='';tabs.forEach(function(t){h+='<button class="mob-btn'+(S.tab===t.id?' active':'')+'" onclick="go(\''+t.id+'\')"><span class="mob-icon">'+t.icon+'</span>'+t.label+'</button>';});
  document.getElementById('mobnav').innerHTML=h;
}
function renderMain(){
  var c='';
  if(S.tab==='home')c=pageDashboard();
  else if(S.tab==='ops')c=pageOps();
  else if(S.tab==='analytics')c=pageAnalytics();
  else if(S.tab==='budget')c=pageBudget();
  else if(S.tab==='settings')c=pageSettings();
  document.getElementById('main').innerHTML=c;
}
function renderModal(){
  var old=document.getElementById('moverlay');if(old)old.remove();
  if(!S.modal)return;
  var c='';
  if(S.modal==='txn')c=modalTxn();
  else if(S.modal==='bar_detail')c=modalBarDetail();
  else if(S.modal==='cat')c=modalCat();
  else if(S.modal==='budget')c=modalBudget();
  else if(S.modal==='del_txn'){var t=DB.txns.find(function(x){return x.id===S.mEditId;});c=modalConfirm('Удалить операцию?','Операция на ₸'+fmt(t?t.amount:0)+' будет удалена навсегда.','delTxn()');}
  else if(S.modal==='del_cat'){var cat=DB.cats.find(function(x){return x.id===S.mcEditId;});c=modalConfirm('Удалить категорию?','Удалить категорию? Связанные операции останутся.','delCat()');}
  else if(S.modal==='reset')c=modalConfirm('Сбросить данные?','Будут удалены все операции и настройки. Необратимо.','resetAll()');
  var ov=document.createElement('div');ov.id='moverlay';ov.className='overlay';
  ov.addEventListener('click',function(e){if(e.target===ov)closeModal();});
  var m=document.createElement('div');m.className='modal';m.innerHTML=c;
  ov.appendChild(m);document.body.appendChild(ov);
  setTimeout(function(){var f=m.querySelector('input[type=number],input[type=text]');if(f)f.focus();},100);
}
function render(){renderSidebar();renderMobNav();renderMain();}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
function startApp(name){
  loadDB(); // load local first for instant start
  document.getElementById('authScreen').style.display='none';
  document.getElementById('appScreen').className='app visible';
  document.getElementById('fab').addEventListener('click',openAddTxn);
  render();
  // Then try to load fresher data from cloud
  loadFromCloud(function(loaded){
    if(loaded) render(); // re-render with cloud data
  });
}

// Init Firebase
initFirebase();

// Check session on load
var _savedName = checkAutoLogin();
if(_savedName){
  startApp(_savedName);
}

// Enter key on auth
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var lf=document.getElementById('loginForm');
    var rf=document.getElementById('regForm');
    if(lf&&lf.style.display!=='none')doLogin();
    else if(rf&&rf.style.display!=='none')doRegister();
  }
});
</script>
